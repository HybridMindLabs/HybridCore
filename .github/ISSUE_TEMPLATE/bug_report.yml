name: Bug report
description: Report a reproducible problem in HybridCore core
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please do **not** report
        security vulnerabilities here — see [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HybridCore version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PHP version, database, web server, OS. Relevant browser/console errors.
    validations:
      required: false
